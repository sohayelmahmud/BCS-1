<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>
</head>

<body bgcolor="#f0f0f0">

    <br><br><br>
    <table width="350" align="center" bgcolor="white" border="1" cellpadding="20" cellspacing="0">
        <tr>
            <td>
                <center>
                    <h2>Login Form</h2>

                    <form action="profile.html">
                        <table border="0">
                            <tr>
                                <td>Username:</td>
                                <td><input type="text" name="username" required></td>
                            </tr>
                            <tr>
                                <td>Password:</td>
                                <td><input type="password" name="password" required></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <br>
                                    <input type="submit" value="Login and View Bio">
                                </td>
                            </tr>
                        </table>
                    </form>

                    <p style="font-size: 12px; color: gray;">
                        Write anything in the username and password fields to go to profile page.
                    </p>
                </center>
            </td>
        </tr>
    </table>

</body>

</html>
